<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>코브라 게임 (Snake Game)</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d29;
    --accent: #4ade80;
    --accent2: #22c55e;
    --food: #f87171;
    --grid: #1e2230;
    --text: #e5e7eb;
    --muted: #8b8fa3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 0%, #1a1e2e, var(--bg));
    font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: var(--text);
    padding: 20px;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 28px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--accent), #60a5fa);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle {
    color: var(--muted);
    margin-bottom: 16px;
    font-size: 13px;
  }
  .hud {
    display: flex;
    gap: 24px;
    margin-bottom: 12px;
    font-size: 15px;
  }
  .hud span { color: var(--accent); font-weight: bold; }
  .board-wrap {
    position: relative;
    background: var(--panel);
    padding: 12px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 0 1px #2a2f42;
  }
  canvas {
    display: block;
    background: var(--grid);
    border-radius: 8px;
  }
  .overlay {
    position: absolute;
    inset: 12px;
    background: rgba(15, 17, 23, 0.88);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .overlay h2 {
    margin: 0 0 8px;
    font-size: 24px;
    color: var(--accent);
  }
  .overlay p {
    color: var(--muted);
    margin: 4px 0 16px;
    font-size: 14px;
    line-height: 1.6;
  }
  button {
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    color: #0f1117;
    border: none;
    padding: 10px 24px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(74, 222, 128, 0.35);
  }
  .controls-info {
    margin-top: 14px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
  }
  .keycap {
    display: inline-block;
    background: #262b3d;
    border: 1px solid #3a3f56;
    border-radius: 6px;
    padding: 2px 8px;
    margin: 0 2px;
    font-family: monospace;
    color: var(--text);
  }
  .mobile-controls {
    display: none;
    margin-top: 16px;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 6px;
    user-select: none;
  }
  .mobile-controls button {
    width: 56px;
    height: 56px;
    padding: 0;
    font-size: 20px;
    border-radius: 12px;
  }
  @media (max-width: 640px) {
    .mobile-controls { display: grid; }
  }
</style>
</head>
<body>

<h1>🐍 코브라 게임</h1>
<div class="subtitle">화살표 키 또는 WASD로 조작하세요</div>

<div class="hud">
  <div>점수: <span id="score">0</span></div>
  <div>최고 점수: <span id="highscore">0</span></div>
</div>

<div class="board-wrap">
  <canvas id="game" width="480" height="480"></canvas>
  <div class="overlay" id="startOverlay">
    <h2>코브라 게임</h2>
    <p>먹이를 먹고 몸을 키우세요.<br>벽이나 자신의 몸에 부딪히면 게임이 끝납니다.</p>
    <button id="startBtn">게임 시작</button>
  </div>
  <div class="overlay hidden" id="gameOverOverlay">
    <h2>게임 오버!</h2>
    <p id="finalScoreText">점수: 0</p>
    <button id="restartBtn">다시 시작</button>
  </div>
</div>

<div class="controls-info">
  <span class="keycap">↑</span><span class="keycap">↓</span><span class="keycap">←</span><span class="keycap">→</span>
  또는
  <span class="keycap">W</span><span class="keycap">A</span><span class="keycap">S</span><span class="keycap">D</span>
  &nbsp;·&nbsp; 일시정지: <span class="keycap">Space</span>
</div>

<div class="mobile-controls" id="mobileControls">
  <span></span><button data-dir="up">▲</button><span></span>
  <button data-dir="left">◀</button><span></span><button data-dir="right">▶</button>
  <span></span><button data-dir="down">▼</button><span></span>
</div>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const cell = 20;
  const cols = canvas.width / cell;
  const rows = canvas.height / cell;

  const scoreEl = document.getElementById('score');
  const highscoreEl = document.getElementById('highscore');
  const startOverlay = document.getElementById('startOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const finalScoreText = document.getElementById('finalScoreText');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const mobileControls = document.getElementById('mobileControls');

  let snake, dir, nextDir, food, score, gameLoop, speed, running, paused;
  let highscore = 0;
  try {
    highscore = parseInt(localStorage.getItem('snake_highscore') || '0', 10);
  } catch(e) { highscore = 0; }
  highscoreEl.textContent = highscore;

  function initState() {
    snake = [
      { x: 8, y: 12 },
      { x: 7, y: 12 },
      { x: 6, y: 12 }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    speed = 130;
    paused = false;
    scoreEl.textContent = score;
    placeFood();
  }

  function placeFood() {
    let valid = false;
    while (!valid) {
      food = {
        x: Math.floor(Math.random() * cols),
        y: Math.floor(Math.random() * rows)
      };
      valid = !snake.some(s => s.x === food.x && s.y === food.y);
    }
  }

  function drawCell(x, y, color, radius) {
    ctx.fillStyle = color;
    const px = x * cell, py = y * cell;
    const r = radius || 4;
    ctx.beginPath();
    ctx.moveTo(px + r, py);
    ctx.arcTo(px + cell, py, px + cell, py + cell, r);
    ctx.arcTo(px + cell, py + cell, px, py + cell, r);
    ctx.arcTo(px, py + cell, px, py, r);
    ctx.arcTo(px, py, px + cell, py, r);
    ctx.closePath();
    ctx.fill();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // grid background subtle lines
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    for (let i = 0; i <= cols; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cell, 0);
      ctx.lineTo(i * cell, canvas.height);
      ctx.stroke();
    }
    for (let j = 0; j <= rows; j++) {
      ctx.beginPath();
      ctx.moveTo(0, j * cell);
      ctx.lineTo(canvas.width, j * cell);
      ctx.stroke();
    }

    // food
    ctx.save();
    ctx.shadowColor = '#f87171';
    ctx.shadowBlur = 12;
    drawCell(food.x, food.y, '#f87171', 8);
    ctx.restore();

    // snake
    snake.forEach((seg, i) => {
      const isHead = i === 0;
      const color = isHead ? '#4ade80' : `rgba(74, 222, 128, ${1 - i * 0.03})`;
      drawCell(seg.x, seg.y, isHead ? '#4ade80' : '#34d399', isHead ? 6 : 4);
    });

    if (paused) {
      ctx.fillStyle = 'rgba(15,17,23,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#e5e7eb';
      ctx.font = 'bold 24px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('일시정지', canvas.width / 2, canvas.height / 2);
    }
  }

  function step() {
    if (paused) return;
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
      return endGame();
    }
    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return endGame();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      placeFood();
      if (speed > 60) {
        speed -= 3;
        restartLoop();
      }
    } else {
      snake.pop();
    }

    draw();
  }

  function restartLoop() {
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(step, speed);
  }

  function endGame() {
    running = false;
    clearInterval(gameLoop);
    if (score > highscore) {
      highscore = score;
      highscoreEl.textContent = highscore;
      try { localStorage.setItem('snake_highscore', highscore); } catch(e) {}
    }
    finalScoreText.textContent = `점수: ${score}`;
    gameOverOverlay.classList.remove('hidden');
  }

  function startGame() {
    startOverlay.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    initState();
    draw();
    running = true;
    restartLoop();
  }

  function setDirection(dx, dy) {
    // prevent reversing directly into itself
    if (dx === -dir.x && dy === -dir.y) return;
    if (dx === dir.x && dy === dir.y) return;
    nextDir = { x: dx, y: dy };
  }

  document.addEventListener('keydown', (e) => {
    if (!running && (e.code === 'Space' || e.key === 'Enter')) {
      startGame();
      return;
    }
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W': setDirection(0, -1); e.preventDefault(); break;
      case 'ArrowDown': case 's': case 'S': setDirection(0, 1); e.preventDefault(); break;
      case 'ArrowLeft': case 'a': case 'A': setDirection(-1, 0); e.preventDefault(); break;
      case 'ArrowRight': case 'd': case 'D': setDirection(1, 0); e.preventDefault(); break;
      case ' ':
        if (running) {
          paused = !paused;
          draw();
        }
        e.preventDefault();
        break;
    }
  });

  mobileControls.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const d = btn.dataset.dir;
    if (d === 'up') setDirection(0, -1);
    if (d === 'down') setDirection(0, 1);
    if (d === 'left') setDirection(-1, 0);
    if (d === 'right') setDirection(1, 0);
  });

  // swipe support
  let touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDirection(dx > 0 ? 1 : -1, 0);
    } else {
      setDirection(0, dy > 0 ? 1 : -1);
    }
  }, { passive: true });

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  // initial static draw
  initState();
  draw();
})();
</script>

</body>
</html>
